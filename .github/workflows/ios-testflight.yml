name: iOS TestFlight Distribution

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile to use'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

# Prevent concurrent builds from stepping on each other
concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-submit:
    name: Build & Submit to TestFlight
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node / pnpm ────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      # ── 3. EAS CLI ────────────────────────────────────────────────────────
      - name: Install EAS CLI
        run: npm install --global eas-cli@latest

      # ── 4. Expo Auth ──────────────────────────────────────────────────────
      - name: Authenticate with Expo
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ── 5. Determine build profile ────────────────────────────────────────
      # On push to main → always use "preview" profile
      # On manual dispatch → use the selected profile
      - name: Resolve EAS profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.profile }}" >> $GITHUB_OUTPUT
          else
            echo "name=preview" >> $GITHUB_OUTPUT
          fi

      # ── 6. Build ──────────────────────────────────────────────────────────
      - name: Build iOS app via EAS
        working-directory: mobile
        run: |
          eas build \
            --platform ios \
            --profile ${{ steps.profile.outputs.name }} \
            --non-interactive \
            --no-wait=false
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ── 7. Submit to TestFlight ───────────────────────────────────────────
      - name: Submit to TestFlight
        working-directory: mobile
        run: |
          eas submit \
            --platform ios \
            --profile ${{ steps.profile.outputs.name == 'production' && 'production' || 'preview' }} \
            --latest \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      # ── 8. Notify on success ──────────────────────────────────────────────
      - name: Post build summary
        if: success()
        run: |
          echo "## ✅ iOS Build Shipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Profile | \`${{ steps.profile.outputs.name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check [App Store Connect](https://appstoreconnect.apple.com) to manage testers." >> $GITHUB_STEP_SUMMARY

      # ── 9. Notify on failure ──────────────────────────────────────────────
      - name: Post failure summary
        if: failure()
        run: |
          echo "## ❌ iOS Build Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details." >> $GITHUB_STEP_SUMMARY
          echo "Common causes: expired Apple credentials, missing secrets, or EAS quota exceeded." >> $GITHUB_STEP_SUMMARY