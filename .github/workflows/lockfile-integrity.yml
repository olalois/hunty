name: Lockfile Integrity

on:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'pnpm-lock.yaml'
      - 'mobile/package.json'
      - 'mobile/package-lock.json'
      - 'mobile/pnpm-lock.yaml'
      - '.github/workflows/lockfile-integrity.yml'

permissions:
  contents: read

jobs:
  npm-lockfiles:
    name: Verify npm lockfiles
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - '.'
          - 'mobile'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.project == '.' && 'package-lock.json' || 'mobile/package-lock.json' }}

      - name: Verify lockfile can install cleanly
        working-directory: ${{ matrix.project }}
        run: npm ci --ignore-scripts

  pnpm-lockfiles:
    name: Verify pnpm lockfiles
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - '.'
          - 'mobile'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: ${{ matrix.project == '.' && 'pnpm-lock.yaml' || 'mobile/pnpm-lock.yaml' }}

      - name: Verify pnpm lockfile is frozen
        working-directory: ${{ matrix.project }}
        run: pnpm install --frozen-lockfile --ignore-scripts
